<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Quizz em JS!</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
</head>
<body>
    <h1 id="main-title">Quizz de programação!</h1>
    <!-- SCORE BOARD-->
    <div id="score-container" class="hide">
        <h2>Parabéns!</h2>
        <p id="display-score"><span>90</span>%</p>
        <p>Você acertou <span id="correct-answers">0</span> de <span id="questions-qty">10</span> perguntas.</p>
        <button id="restart">Refazer quizz!</button>
    </div>
    <!-- QUIZZ CONTAINER-->
    <div id="quizz-container">
        <p id="question"><span id="question-number">1</span> - <span id="question-text">O que significa a sigla SQL?</span></p>
        <div id="answers-box">
            <!-- <button><span class="btn-letter">A</span> <span class="question-answer">Structured Query Language</span></button>
            <button><span class="btn-letter">B</span> <span class="question-answer">Simple Quick Logic</span></button>
            <button><span class="btn-letter">C</span> <span class="question-answer">System Query Link</span></button>
            <button><span class="btn-letter">D</span> <span class="question-answer">Standard Quality Language</span></button> -->
        </div>
    </div>

    <!-- TEMPLATE RESPOSTA -->
    <button class="answer-template hide"><span class="btn-letter"></span> <span class="question-answer"></span></button>
</body>
</html>
